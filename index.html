<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星際闖關射擊</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height:100%;
    background:#05050f;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:"Microsoft JhengHei", "PingFang TC", sans-serif;
    overflow:hidden;
  }
  #wrap {
    position:relative;
    width:480px;
    height:720px;
    max-width:100vw;
    max-height:100vh;
  }
  canvas {
    display:block;
    background:radial-gradient(ellipse at center, #0a0a2a 0%, #000005 100%);
    width:100%;
    height:100%;
    touch-action:none;
    cursor:crosshair;
  }
  #hud {
    position:absolute;
    top:8px; left:8px; right:8px;
    display:flex;
    justify-content:space-between;
    color:#e8f6ff;
    font-size:16px;
    text-shadow:0 0 6px rgba(80,180,255,0.8);
    pointer-events:none;
    letter-spacing:1px;
    z-index:5;
  }
  #overlay {
    position:absolute;
    inset:0;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:#eaf6ff;
    background:rgba(2,2,10,0.72);
    gap:14px;
    padding:20px;
  }
  #overlay h1 {
    font-size:34px;
    color:#7fe0ff;
    text-shadow:0 0 14px #2ad2ff;
    letter-spacing:2px;
  }
  #overlay p {
    font-size:14px;
    line-height:1.7;
    color:#c9d8e8;
    max-width:360px;
  }
  #overlay button {
    margin-top:8px;
    padding:12px 34px;
    font-size:17px;
    border:none;
    border-radius:30px;
    background:linear-gradient(180deg,#39d0ff,#0a86c9);
    color:#00131a;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
    box-shadow:0 0 18px rgba(60,200,255,0.7);
  }
  #overlay button:active { transform:scale(0.96); }
  .hidden { display:none !important; }
  #mobileHint {
    font-size:12px;
    color:#7a8ba0;
  }
  #hudRight {
    display:flex;
    align-items:center;
    gap:8px;
    pointer-events:auto;
  }
  #muteBtn {
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:50%;
    width:26px;
    height:26px;
    font-size:14px;
    line-height:1;
    color:#e8f6ff;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
  }
  #muteBtn:active { transform:scale(0.9); }
  #hud2 {
    position:absolute;
    top:32px; left:8px; right:8px;
    display:flex;
    justify-content:flex-start;
    gap:14px;
    color:#bfe8ff;
    font-size:12px;
    text-shadow:0 0 5px rgba(80,180,255,0.7);
    pointer-events:none;
    letter-spacing:0.5px;
    z-index:5;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="480" height="720"></canvas>
  <div id="hud">
    <span id="hudLevel">關卡 1</span>
    <span id="hudScore">分數 0</span>
    <span id="hudRight">
      <span id="hudLives">❤❤❤</span>
      <button id="muteBtn" title="靜音切換">🔊</button>
    </span>
  </div>
  <div id="hud2">
    <span id="hudWeapon">🔫 Lv1</span>
    <span id="hudRocket">🚀 x0</span>
    <span id="hudShield">🛡️ x0</span>
  </div>
  <div id="overlay">
    <h1>星際闖關射擊</h1>
    <p>
      電腦: 方向鍵 / WASD 移動,空白鍵 或 滑鼠左鍵 射擊(按住連發)。<br>
      手機: 手指拖曳移動,自動連續射擊。<br><br>
      共 5 關,越後面敵人越多越快,第 5 關是王,擊敗即通關!每關都有不同背景音樂,王關更緊張刺激。<br><br>
      擊落敵機有機率掉落道具:🔫多重射擊、🚀火箭彈(範圍爆炸)、🛡️防護罩(格擋一次傷害)。
    </p>
    <p id="mobileHint">碰到敵人或敵彈會扣血,3 條命用完遊戲結束。</p>
    <button id="startBtn">開始遊戲</button>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const muteBtn = document.getElementById('muteBtn');
  const hudLevel = document.getElementById('hudLevel');
  const hudScore = document.getElementById('hudScore');
  const hudLives = document.getElementById('hudLives');
  const hudWeapon = document.getElementById('hudWeapon');
  const hudRocket = document.getElementById('hudRocket');
  const hudShield = document.getElementById('hudShield');

  const MAX_LEVEL = 5;

  // ---------- Audio ----------
  const SFX = (function(){
    let ctx = null;
    let noiseBuffer = null;
    let musicGain = null;
    let muted = localStorage.getItem('shooterMuted') === '1';
    let schedulerTimer = null;
    let currentTrack = null;
    let nextNoteTime = 0;
    let bassStep = 0, leadStep = 0;

    function ensureCtx(){
      if (!ctx){
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        ctx = new AC();
        const len = Math.floor(ctx.sampleRate * 0.5);
        noiseBuffer = ctx.createBuffer(1, len, ctx.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i=0;i<len;i++) data[i] = Math.random()*2-1;
        musicGain = ctx.createGain();
        musicGain.gain.value = muted ? 0 : 0.22;
        musicGain.connect(ctx.destination);
      }
      if (ctx.state === 'suspended') ctx.resume();
    }

    function tone(freq, duration, opts={}){
      if (muted || !ctx) return;
      const t0 = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = opts.type || 'square';
      osc.frequency.setValueAtTime(freq, t0);
      if (opts.freqEnd !== undefined){
        osc.frequency.exponentialRampToValueAtTime(Math.max(opts.freqEnd,1), t0+duration);
      }
      const vol = opts.volume !== undefined ? opts.volume : 0.15;
      gain.gain.setValueAtTime(vol, t0);
      gain.gain.exponentialRampToValueAtTime(0.001, t0+duration);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t0);
      osc.stop(t0+duration);
    }

    function noiseBurst(duration, opts={}){
      if (muted || !ctx || !noiseBuffer) return;
      const t0 = ctx.currentTime;
      const src = ctx.createBufferSource();
      src.buffer = noiseBuffer;
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(opts.freqStart || 1800, t0);
      filter.frequency.exponentialRampToValueAtTime(opts.freqEnd || 200, t0+duration);
      const gain = ctx.createGain();
      const vol = opts.volume !== undefined ? opts.volume : 0.3;
      gain.gain.setValueAtTime(vol, t0);
      gain.gain.exponentialRampToValueAtTime(0.001, t0+duration);
      src.connect(filter).connect(gain).connect(ctx.destination);
      src.start(t0);
      src.stop(t0+duration);
    }

    function sequence(freqs, noteDur, gap, opts={}){
      freqs.forEach((f,i)=>{
        setTimeout(()=>tone(f, noteDur, opts), i*gap);
      });
    }

    // ---- Background music (procedural chiptune loops, one per level) ----
    const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    function nf(note, octave){
      const idx = NOTE_NAMES.indexOf(note);
      const semis = (octave-4)*12 + (idx-9);
      return 440*Math.pow(2, semis/12);
    }

    const TRACKS = {
      1: { bpm:118, bassType:'triangle', leadType:'square', bassVol:0.09, leadVol:0.045,
           bass:[nf('C',3),nf('C',3),nf('G',2),nf('G',2),nf('A',2),nf('A',2),nf('G',2),nf('G',2)],
           lead:[nf('C',5),nf('E',5),nf('G',5),nf('E',5), nf('C',5),nf('E',5),nf('G',5),nf('E',5),
                 nf('A',4),nf('C',5),nf('E',5),nf('C',5), nf('G',4),nf('C',5),nf('E',5),nf('D',5)] },
      2: { bpm:132, bassType:'triangle', leadType:'square', bassVol:0.09, leadVol:0.045,
           bass:[nf('A',2),nf('A',2),nf('F',2),nf('F',2),nf('G',2),nf('G',2),nf('E',2),nf('E',2)],
           lead:[nf('A',4),nf('C',5),nf('E',5),nf('C',5), nf('F',4),nf('A',4),nf('C',5),nf('A',4),
                 nf('G',4),nf('B',4),nf('D',5),nf('B',4), nf('E',4),nf('G',4),nf('B',4),nf('C',5)] },
      3: { bpm:146, bassType:'sawtooth', leadType:'square', bassVol:0.08, leadVol:0.05,
           bass:[nf('D',3),nf('D',3),nf('A',2),nf('A',2),nf('B',2),nf('B',2),nf('C',3),nf('C',3)],
           lead:[nf('D',5),nf('F',5),nf('A',5),nf('F',5), nf('A',4),nf('D',5),nf('F',5),nf('D',5),
                 nf('B',4),nf('D',5),nf('F',5),nf('D',5), nf('C',5),nf('E',5),nf('G',5),nf('F',5)] },
      4: { bpm:160, bassType:'sawtooth', leadType:'square', bassVol:0.09, leadVol:0.055,
           bass:[nf('E',3),nf('E',3),nf('C',3),nf('C',3),nf('D',3),nf('D',3),nf('B',2),nf('B',2)],
           lead:[nf('E',5),nf('G',5),nf('B',5),nf('G',5), nf('C',5),nf('E',5),nf('G',5),nf('E',5),
                 nf('D',5),nf('F',5),nf('A',5),nf('F',5), nf('B',4),nf('D',5),nf('F',5),nf('E',5)] },
      boss: { bpm:186, bassType:'sawtooth', leadType:'square', bassVol:0.12, leadVol:0.06,
           bass:[nf('D',2),nf('D',2),nf('D',2),nf('D',2),nf('A',2),nf('A',2),nf('D',2),nf('C',2)],
           lead:[nf('D',5),nf('D#',5),nf('D',5),nf('C',5), nf('D',5),nf('D#',5),nf('F',5),nf('D#',5),
                 nf('A',4),nf('A#',4),nf('A',4),nf('G',4), nf('A',4),nf('C',5),nf('D',5),nf('C',5)] }
    };

    function scheduleMusicNote(freq, time, duration, type, vol){
      if (!freq) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, time);
      gain.gain.setValueAtTime(0, time);
      gain.gain.linearRampToValueAtTime(vol, time+0.008);
      gain.gain.exponentialRampToValueAtTime(0.0005, time+duration);
      osc.connect(gain).connect(musicGain);
      osc.start(time);
      osc.stop(time+duration+0.03);
    }

    function schedulerTick(){
      if (!currentTrack || !ctx) return;
      const track = currentTrack;
      const beatDur = 60/track.bpm;
      while (nextNoteTime < ctx.currentTime + 0.15){
        const bassFreq = track.bass[bassStep % track.bass.length];
        scheduleMusicNote(bassFreq, nextNoteTime, beatDur*0.92, track.bassType, track.bassVol);
        for (let k=0;k<2;k++){
          const leadFreq = track.lead[leadStep % track.lead.length];
          const t = nextNoteTime + k*(beatDur/2);
          scheduleMusicNote(leadFreq, t, (beatDur/2)*0.82, track.leadType, track.leadVol);
          leadStep++;
        }
        bassStep++;
        nextNoteTime += beatDur;
      }
    }

    function playTrack(key){
      ensureCtx();
      if (!ctx) return;
      if (currentTrack === TRACKS[key]) return;
      currentTrack = TRACKS[key];
      bassStep = 0; leadStep = 0;
      nextNoteTime = ctx.currentTime + 0.05;
      if (!schedulerTimer) schedulerTimer = setInterval(schedulerTick, 40);
    }

    function stopMusic(){
      currentTrack = null;
      if (schedulerTimer){ clearInterval(schedulerTimer); schedulerTimer = null; }
    }

    return {
      init(){ ensureCtx(); },
      setMuted(v){
        muted = v;
        localStorage.setItem('shooterMuted', v?'1':'0');
        if (musicGain) musicGain.gain.setTargetAtTime(v?0:0.22, ctx.currentTime, 0.05);
      },
      isMuted(){ return muted; },
      shoot(){ tone(880, 0.07, {type:'square', freqEnd:520, volume:0.05}); },
      hit(){ tone(300, 0.05, {type:'square', freqEnd:200, volume:0.05}); },
      enemyExplode(){ noiseBurst(0.22, {freqStart:2200, freqEnd:200, volume:0.2}); },
      bossExplode(){ noiseBurst(0.6, {freqStart:2600, freqEnd:80, volume:0.35}); },
      rocketExplode(){ noiseBurst(0.35, {freqStart:2400, freqEnd:150, volume:0.3}); },
      pickup(){ sequence([660,880,1180], 0.08, 60, {type:'triangle', volume:0.12}); },
      shieldBlock(){ tone(700, 0.12, {type:'sine', freqEnd:900, volume:0.15}); },
      hurt(){ tone(160, 0.25, {type:'sawtooth', freqEnd:60, volume:0.22}); },
      levelClear(){ sequence([523,659,784,1047], 0.16, 90, {type:'triangle', volume:0.18}); },
      gameOver(){ sequence([400,340,280,200], 0.28, 140, {type:'sawtooth', volume:0.18}); },
      win(){ sequence([523,659,784,1047,1319], 0.22, 110, {type:'triangle', volume:0.2}); },
      playMusic(levelOrKey){ playTrack(levelOrKey >= MAX_LEVEL ? 'boss' : levelOrKey); },
      stopMusic(){ stopMusic(); }
    };
  })();

  function updateMuteBtn(){
    muteBtn.textContent = SFX.isMuted() ? '🔇' : '🔊';
  }
  updateMuteBtn();
  muteBtn.addEventListener('click', () => {
    SFX.setMuted(!SFX.isMuted());
    updateMuteBtn();
  });

  let keys = {};
  let pointerActive = false;
  let pointerX = null, pointerY = null;

  let state = 'menu'; // menu | playing | levelClear | dead | win
  let level = 1;
  let score = 0;
  let lives = 3;
  let frame = 0;
  let stars = [];

  let player, bullets, enemies, enemyBullets, particles, powerups;
  let levelTimer = 0;
  let spawnQueue = [];
  let boss = null;
  let invincibleTimer = 0;
  let stateTimer = 0;

  let weaponLevel = 1;
  let rockets = 0;
  let shieldHits = 0;
  let rocketCooldown = 0;

  function resetGameState(){
    score = 0;
    lives = 3;
    level = 1;
    weaponLevel = 1;
    rockets = 0;
    shieldHits = 0;
    rocketCooldown = 0;
  }

  function initStars(){
    stars = [];
    for (let i=0;i<90;i++){
      stars.push({
        x: Math.random()*W,
        y: Math.random()*H,
        speed: 0.5 + Math.random()*2.5,
        size: Math.random()*2 + 0.5
      });
    }
  }

  function initPlayer(){
    player = {
      x: W/2, y: H-90,
      w: 34, h: 34,
      speed: 5.2,
      cooldown: 0,
      fireRate: 9
    };
  }

  function buildLevel(lv){
    bullets = [];
    enemies = [];
    enemyBullets = [];
    particles = [];
    powerups = [];
    boss = null;
    levelTimer = 0;
    invincibleTimer = 90;

    if (lv < MAX_LEVEL){
      const waveCount = 3 + lv;
      const perWave = 4 + lv;
      spawnQueue = [];
      for (let w=0; w<waveCount; w++){
        for (let i=0; i<perWave; i++){
          spawnQueue.push({
            delay: w*70 + i*14,
            type: (lv >= 3 && (i % 3 === 0)) ? 'zigzag' : 'basic',
            col: i % perWave
          });
        }
      }
    } else {
      spawnQueue = [];
      boss = {
        x: W/2, y: -80,
        w: 110, h: 70,
        hp: 220,
        maxHp: 220,
        speed: 2.2,
        dir: 1,
        cooldown: 0,
        entering: true,
        dropThresholds: [Math.floor(220*0.66), Math.floor(220*0.33)]
      };
    }
  }

  function startGame(){
    resetGameState();
    initPlayer();
    initStars();
    buildLevel(level);
    state = 'playing';
    overlay.classList.add('hidden');
    updateHud();
    SFX.playMusic(level);
  }

  function nextLevel(){
    level++;
    if (level > MAX_LEVEL){
      state = 'win';
      showOverlay('全部過關!', `太厲害了,恭喜通過全部 ${MAX_LEVEL} 關!<br>最終分數: ${score}`, '再玩一次');
      SFX.stopMusic();
      SFX.win();
      return;
    }
    initPlayer();
    buildLevel(level);
    state = 'playing';
    updateHud();
    SFX.playMusic(level);
  }

  function updateHud(){
    hudLevel.textContent = '關卡 ' + level + (level>MAX_LEVEL?'':(level===MAX_LEVEL?' (BOSS)':''));
    hudScore.textContent = '分數 ' + score;
    hudLives.textContent = '❤'.repeat(Math.max(lives,0)) + '♡'.repeat(Math.max(3-lives,0));
    hudWeapon.textContent = '🔫 Lv' + weaponLevel;
    hudRocket.textContent = '🚀 x' + rockets;
    hudShield.textContent = '🛡️ x' + shieldHits;
  }

  function showOverlay(title, text, btnText){
    overlay.querySelector('h1').textContent = title;
    overlay.querySelector('p').innerHTML = text;
    document.getElementById('mobileHint').classList.add('hidden');
    startBtn.textContent = btnText;
    overlay.classList.remove('hidden');
  }

  // ---------- Input ----------
  const GAME_KEYS = [' ','arrowleft','arrowright','arrowup','arrowdown','a','d','w','s'];
  window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (GAME_KEYS.includes(e.key.toLowerCase())) e.preventDefault();
  });
  window.addEventListener('keyup', e => {
    keys[e.key.toLowerCase()] = false;
  });

  function canvasPos(clientX, clientY){
    const rect = canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) * (W/rect.width),
      y: (clientY - rect.top) * (H/rect.height)
    };
  }

  canvas.addEventListener('mousedown', e => {
    pointerActive = true;
    const p = canvasPos(e.clientX, e.clientY);
    pointerX = p.x; pointerY = p.y;
  });
  window.addEventListener('mouseup', () => { pointerActive = false; });
  canvas.addEventListener('mousemove', e => {
    const p = canvasPos(e.clientX, e.clientY);
    pointerX = p.x; pointerY = p.y;
  });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    pointerActive = true;
    const t = e.touches[0];
    const p = canvasPos(t.clientX, t.clientY);
    pointerX = p.x; pointerY = p.y;
  }, {passive:false});
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    const p = canvasPos(t.clientX, t.clientY);
    pointerX = p.x; pointerY = p.y;
  }, {passive:false});
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    pointerActive = false;
  }, {passive:false});

  startBtn.addEventListener('click', () => {
    SFX.init();
    if (state === 'menu' || state === 'dead' || state === 'win'){
      startGame();
    }
  });

  // ---------- Helpers ----------
  function rectsOverlap(a,b){
    return Math.abs(a.x-b.x) < (a.w+b.w)/2 && Math.abs(a.y-b.y) < (a.h+b.h)/2;
  }

  function spawnParticles(x,y,color,count){
    for (let i=0;i<count;i++){
      particles.push({
        x, y,
        vx: (Math.random()-0.5)*6,
        vy: (Math.random()-0.5)*6,
        life: 20 + Math.random()*15,
        color
      });
    }
  }

  function spawnEnemy(type, col, totalCols){
    const margin = 40;
    const x = margin + (col % totalCols) * ((W-margin*2)/(totalCols-1||1));
    enemies.push({
      x, y: -30,
      w: 28, h: 24,
      vx: type==='zigzag' ? (Math.random()<0.5?-1:1)*2 : 0,
      vy: 1.6 + level*0.15,
      type,
      hp: type==='zigzag'?2:1,
      cooldown: 60 + Math.random()*80,
      t: Math.random()*Math.PI*2
    });
  }

  function spawnPowerupAt(x,y){
    const roll = Math.random();
    const type = roll < 0.4 ? 'multi' : (roll < 0.75 ? 'rocket' : 'shield');
    powerups.push({x,y,w:20,h:20,vy:1.6,type});
  }

  function maybeDropPowerup(x,y){
    if (Math.random() < 0.16) spawnPowerupAt(x,y);
  }

  function applyPowerup(type){
    SFX.pickup();
    if (type==='multi'){
      weaponLevel = Math.min(weaponLevel+1, 3);
    } else if (type==='rocket'){
      rockets = Math.min(rockets+3, 9);
    } else if (type==='shield'){
      shieldHits = Math.min(shieldHits+1, 3);
    }
    updateHud();
  }

  function killEnemy(i){
    const en = enemies[i];
    score += en.type==='zigzag'?150:100;
    spawnParticles(en.x,en.y,'#ffaa3c',14);
    maybeDropPowerup(en.x,en.y);
    enemies.splice(i,1);
    SFX.enemyExplode();
  }

  function applyRocketExplosion(x,y){
    spawnParticles(x,y,'#ffb347',22);
    SFX.rocketExplode();
    const RADIUS = 60;
    for (let i=enemies.length-1;i>=0;i--){
      const en = enemies[i];
      if (Math.hypot(en.x-x, en.y-y) < RADIUS){
        score += en.type==='zigzag'?150:100;
        spawnParticles(en.x,en.y,'#ffaa3c',10);
        maybeDropPowerup(en.x,en.y);
        enemies.splice(i,1);
      }
    }
  }

  function finishBoss(){
    score += 2000;
    spawnParticles(boss.x, boss.y, '#ffaa3c', 60);
    boss = null;
    state = 'levelClear';
    stateTimer = 0;
    SFX.bossExplode();
  }

  // ---------- Update ----------
  function updatePlayer(){
    if (invincibleTimer>0) invincibleTimer--;

    let dx=0, dy=0;
    if (keys['arrowleft']||keys['a']) dx -= 1;
    if (keys['arrowright']||keys['d']) dx += 1;
    if (keys['arrowup']||keys['w']) dy -= 1;
    if (keys['arrowdown']||keys['s']) dy += 1;

    if (dx!==0 || dy!==0){
      const len = Math.hypot(dx,dy) || 1;
      player.x += (dx/len) * player.speed;
      player.y += (dy/len) * player.speed;
    } else if (pointerActive && pointerX !== null){
      const ddx = pointerX - player.x;
      const ddy = pointerY - player.y;
      const dist = Math.hypot(ddx,ddy);
      if (dist > 3){
        player.x += ddx/dist * Math.min(player.speed*1.5, dist);
        player.y += ddy/dist * Math.min(player.speed*1.5, dist);
      }
    }

    player.x = Math.max(player.w/2, Math.min(W-player.w/2, player.x));
    player.y = Math.max(player.h/2, Math.min(H-player.h/2, player.y));

    player.cooldown--;
    if (rocketCooldown>0) rocketCooldown--;
    const wantsFire = keys[' ']||keys['space']||pointerActive;
    if (wantsFire && player.cooldown<=0){
      fireBullets();
      player.cooldown = player.fireRate;
      SFX.shoot();
    }
    if (wantsFire && rockets>0 && rocketCooldown<=0){
      bullets.push({x:player.x, y:player.y-20, vx:0, vy:-7, w:8, h:20, rocket:true});
      rockets--;
      rocketCooldown = 45;
      updateHud();
    }
  }

  function fireBullets(){
    const baseY = player.y-18;
    if (weaponLevel<=1){
      bullets.push({x:player.x-9, y:baseY, vx:0, vy:-9, w:4, h:12});
      bullets.push({x:player.x+9, y:baseY, vx:0, vy:-9, w:4, h:12});
    } else if (weaponLevel===2){
      bullets.push({x:player.x, y:baseY-4, vx:0, vy:-9.5, w:4, h:12});
      bullets.push({x:player.x-10, y:baseY, vx:-1.6, vy:-9, w:4, h:12});
      bullets.push({x:player.x+10, y:baseY, vx:1.6, vy:-9, w:4, h:12});
    } else {
      bullets.push({x:player.x, y:baseY-4, vx:0, vy:-9.5, w:4, h:12});
      bullets.push({x:player.x-8, y:baseY, vx:-1.2, vy:-9, w:4, h:12});
      bullets.push({x:player.x+8, y:baseY, vx:1.2, vy:-9, w:4, h:12});
      bullets.push({x:player.x-16, y:baseY+4, vx:-2.6, vy:-8.6, w:4, h:12});
      bullets.push({x:player.x+16, y:baseY+4, vx:2.6, vy:-8.6, w:4, h:12});
    }
  }

  function updateBullets(){
    for (let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];
      b.x += b.vx||0;
      b.y += b.vy;
      if (b.y < -20 || b.x<-20 || b.x>W+20) bullets.splice(i,1);
    }
    for (let i=enemyBullets.length-1;i>=0;i--){
      const b = enemyBullets[i];
      b.x += b.vx||0;
      b.y += b.vy;
      if (b.y > H+20 || b.x<-20 || b.x>W+20) enemyBullets.splice(i,1);
    }
  }

  function updateEnemies(){
    levelTimer++;
    if (level < MAX_LEVEL){
      while (spawnQueue.length && spawnQueue[0].delay <= levelTimer){
        const s = spawnQueue.shift();
        const totalCols = 4 + level;
        spawnEnemy(s.type, s.col, totalCols);
      }
    }

    const explosions = [];

    for (let i=enemies.length-1;i>=0;i--){
      const en = enemies[i];
      en.y += en.vy;
      en.t += 0.05;
      if (en.type==='zigzag'){
        en.x += Math.sin(en.t)*2.2;
      }
      en.x = Math.max(16, Math.min(W-16, en.x));

      en.cooldown--;
      if (en.cooldown<=0 && en.y>0 && en.y<H-60){
        en.cooldown = 90 + Math.random()*60;
        const ddx = player.x-en.x, ddy = player.y-en.y;
        const d = Math.hypot(ddx,ddy)||1;
        enemyBullets.push({x:en.x, y:en.y, vx:(ddx/d)*3.2, vy:(ddy/d)*3.2, w:5, h:5});
      }

      if (en.y > H+30){
        enemies.splice(i,1);
        continue;
      }

      for (let j=bullets.length-1;j>=0;j--){
        const b = bullets[j];
        if (rectsOverlap({x:b.x,y:b.y,w:b.w,h:b.h}, en)){
          bullets.splice(j,1);
          if (b.rocket){
            explosions.push({x:b.x, y:b.y});
          } else {
            en.hp--;
            spawnParticles(b.x,b.y,'#7fe0ff',4);
            if (en.hp<=0){
              killEnemy(i);
            } else {
              SFX.hit();
            }
          }
          break;
        }
      }
    }

    for (const ex of explosions) applyRocketExplosion(ex.x, ex.y);
  }

  function updateBoss(){
    if (!boss) return;
    if (boss.entering){
      boss.y += 1.5;
      if (boss.y >= 90) boss.entering = false;
      return;
    }
    boss.x += boss.speed * boss.dir;
    if (boss.x < 70 || boss.x > W-70) boss.dir *= -1;

    boss.cooldown--;
    if (boss.cooldown<=0){
      boss.cooldown = 34;
      const spread = 5;
      for (let i=-spread;i<=spread;i+=spread){
        const ddx = (player.x+i*20)-boss.x, ddy = player.y-boss.y;
        const d = Math.hypot(ddx,ddy)||1;
        enemyBullets.push({x:boss.x, y:boss.y+20, vx:(ddx/d)*3.6, vy:(ddy/d)*3.6, w:6, h:6});
      }
    }

    while (boss.dropThresholds && boss.dropThresholds.length && boss.hp <= boss.dropThresholds[0]){
      boss.dropThresholds.shift();
      spawnPowerupAt(boss.x + (Math.random()-0.5)*60, boss.y+40);
    }

    for (let j=bullets.length-1;j>=0;j--){
      const b = bullets[j];
      if (rectsOverlap({x:b.x,y:b.y,w:b.w,h:b.h}, boss)){
        bullets.splice(j,1);
        if (b.rocket){
          spawnParticles(b.x,b.y,'#ffb347',18);
          SFX.rocketExplode();
          boss.hp -= 14;
        } else {
          spawnParticles(b.x,b.y,'#ff6b6b',4);
          boss.hp--;
        }
        if (boss.hp<=0){
          finishBoss();
          break;
        } else if (!b.rocket){
          SFX.hit();
        }
      }
    }
  }

  function updatePowerups(){
    for (let i=powerups.length-1;i>=0;i--){
      const p = powerups[i];
      p.y += p.vy;
      if (p.y > H+20){ powerups.splice(i,1); continue; }
      if (rectsOverlap({x:player.x,y:player.y,w:player.w,h:player.h}, p)){
        applyPowerup(p.type);
        powerups.splice(i,1);
      }
    }
  }

  function updateParticles(){
    for (let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.95; p.vy *= 0.95;
      p.life--;
      if (p.life<=0) particles.splice(i,1);
    }
  }

  function checkPlayerHit(){
    if (invincibleTimer > 0) return;
    const pRect = {x:player.x,y:player.y,w:player.w*0.6,h:player.h*0.6};

    for (let i=enemies.length-1;i>=0;i--){
      if (rectsOverlap(pRect, enemies[i])){
        enemies.splice(i,1);
        hitPlayer();
        return;
      }
    }
    for (let i=enemyBullets.length-1;i>=0;i--){
      const b = enemyBullets[i];
      if (rectsOverlap(pRect, {x:b.x,y:b.y,w:b.w+6,h:b.h+6})){
        enemyBullets.splice(i,1);
        hitPlayer();
        return;
      }
    }
    if (boss && rectsOverlap(pRect, boss)){
      hitPlayer();
    }
  }

  function hitPlayer(){
    if (shieldHits > 0){
      shieldHits--;
      invincibleTimer = 60;
      spawnParticles(player.x, player.y, '#4be3ff', 16);
      SFX.shieldBlock();
      updateHud();
      return;
    }
    lives--;
    invincibleTimer = 100;
    spawnParticles(player.x, player.y, '#ff5050', 20);
    updateHud();
    if (lives <= 0){
      state = 'dead';
      stateTimer = 0;
      SFX.gameOver();
      SFX.stopMusic();
    } else {
      SFX.hurt();
    }
  }

  function checkLevelComplete(){
    if (level < MAX_LEVEL){
      if (spawnQueue.length===0 && enemies.length===0){
        state = 'levelClear';
        stateTimer = 0;
        SFX.levelClear();
      }
    }
  }

  // ---------- Draw ----------
  function drawStars(){
    ctx.fillStyle = '#fff';
    for (const s of stars){
      s.y += s.speed;
      if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
      ctx.globalAlpha = 0.4 + s.size/3;
      ctx.fillRect(s.x, s.y, s.size, s.size);
    }
    ctx.globalAlpha = 1;
  }

  function drawPlayer(){
    if (invincibleTimer>0 && Math.floor(invincibleTimer/4)%2===0) return;
    ctx.save();
    ctx.translate(player.x, player.y);
    if (shieldHits > 0){
      ctx.strokeStyle = 'rgba(75,227,255,0.8)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0,0,24,0,Math.PI*2);
      ctx.stroke();
    }
    ctx.fillStyle = '#39d0ff';
    ctx.beginPath();
    ctx.moveTo(0,-18);
    ctx.lineTo(15,16);
    ctx.lineTo(0,9);
    ctx.lineTo(-15,16);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#eafcff';
    ctx.beginPath();
    ctx.arc(0,-2,4,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ff9c3c';
    ctx.beginPath();
    ctx.moveTo(-7,14); ctx.lineTo(0,26); ctx.lineTo(7,14);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawBullets(){
    for (const b of bullets){
      if (b.rocket){
        ctx.fillStyle = '#ffb347';
        ctx.beginPath();
        ctx.ellipse(b.x, b.y, b.w/2, b.h/2, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,140,20,0.5)';
        ctx.fillRect(b.x-2, b.y+b.h/2-2, 4, 10);
      } else {
        ctx.fillStyle = '#c8f7ff';
        ctx.fillRect(b.x-b.w/2, b.y-b.h/2, b.w, b.h);
      }
    }
    ctx.fillStyle = '#ff6b6b';
    for (const b of enemyBullets){
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.w, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function drawPowerups(){
    const colors = {multi:'#39d0ff', rocket:'#ff9c3c', shield:'#4bff8f'};
    const labels = {multi:'M', rocket:'R', shield:'S'};
    for (const p of powerups){
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.fillStyle = colors[p.type];
      ctx.beginPath();
      ctx.arc(0,0,11,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#03131a';
      ctx.font = 'bold 12px "Microsoft JhengHei"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(labels[p.type], 0, 1);
      ctx.restore();
    }
  }

  function drawEnemies(){
    for (const en of enemies){
      ctx.save();
      ctx.translate(en.x, en.y);
      ctx.fillStyle = en.type==='zigzag' ? '#c162ff' : '#ff5c7a';
      ctx.beginPath();
      ctx.moveTo(0,14);
      ctx.lineTo(14,-12);
      ctx.lineTo(0,-4);
      ctx.lineTo(-14,-12);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  function drawBoss(){
    if (!boss) return;
    ctx.save();
    ctx.translate(boss.x, boss.y);
    ctx.fillStyle = '#8b2fd6';
    ctx.beginPath();
    ctx.moveTo(-55,-10);
    ctx.lineTo(-30,-30);
    ctx.lineTo(30,-30);
    ctx.lineTo(55,-10);
    ctx.lineTo(35,30);
    ctx.lineTo(-35,30);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ffdf6b';
    ctx.beginPath();
    ctx.arc(0,0,14,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    const barW = 300;
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect((W-barW)/2, 20, barW, 10);
    ctx.fillStyle = '#ff5050';
    ctx.fillRect((W-barW)/2, 20, barW*Math.max(boss.hp,0)/boss.maxHp, 10);
    ctx.strokeStyle = '#fff';
    ctx.strokeRect((W-barW)/2, 20, barW, 10);
  }

  function drawParticles(){
    for (const p of particles){
      ctx.globalAlpha = Math.max(p.life/25,0);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x-2, p.y-2, 4, 4);
    }
    ctx.globalAlpha = 1;
  }

  function drawCenterMsg(text, sub){
    ctx.save();
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, H/2-60, W, 120);
    ctx.fillStyle = '#7fe0ff';
    ctx.font = 'bold 30px "Microsoft JhengHei"';
    ctx.shadowColor = '#2ad2ff';
    ctx.shadowBlur = 12;
    ctx.fillText(text, W/2, H/2-6);
    if (sub){
      ctx.font = '16px "Microsoft JhengHei"';
      ctx.fillStyle = '#dff';
      ctx.shadowBlur = 0;
      ctx.fillText(sub, W/2, H/2+26);
    }
    ctx.restore();
  }

  // ---------- Main loop ----------
  function loop(){
    frame++;
    ctx.clearRect(0,0,W,H);
    drawStars();

    if (state === 'playing'){
      updatePlayer();
      updateBullets();
      if (level < MAX_LEVEL) updateEnemies(); else updateBoss();
      updatePowerups();
      updateParticles();
      checkPlayerHit();
      if (level < MAX_LEVEL) checkLevelComplete();

      drawEnemies();
      drawBoss();
      drawPowerups();
      drawBullets();
      drawParticles();
      drawPlayer();
    } else if (state === 'levelClear'){
      stateTimer++;
      drawEnemies();
      drawBullets();
      drawParticles();
      drawPlayer();
      drawCenterMsg('第 ' + level + ' 關 過關!', '準備進入下一關...');
      if (stateTimer > 90){
        nextLevel();
      }
    } else if (state === 'dead'){
      drawParticles();
      if (stateTimer === 0){
        showOverlay('遊戲結束', `最終分數: ${score}<br>抵達關卡: ${level}`, '重新開始');
      }
      stateTimer++;
    }

    requestAnimationFrame(loop);
  }

  loop();
})();
</script>
